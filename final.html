<!DOCTYPE html>
<html>
<head>
    <title>Final Surprise 💖</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            text-align: center;
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom, #ffd6e8, #fff0f5);
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-top: 60px;
            color: #d63384;
            font-size: 45px;
        }

        p {
            font-size: 20px;
            color: #555;
            padding: 20px;
            line-height: 1.6;
        }

        .cake {
            font-size: 80px;
            animation: bounce 1.5s infinite;
        }

        .heart {
            position: absolute;
            color: #ff4d88;
            font-size: 25px;
            animation: fall 5s linear infinite;
        }

        button {
            background: #d63384;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
        }

        @keyframes bounce {
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes fall {
            from {
                top: -10%;
            }
            to {
                top: 100%;
            }
        }
    </style>
</head>

<body>

<h1>🎂 Happy Birthday 💕</h1>

<div class="cake">🎂</div>

<p>
    Today is a special day because someone special was born. 💖<br><br>

    Thank you for all the beautiful memories, laughter,
    and moments that made life happier.<br><br>

    May your dreams come true, your smile always stay bright,
    and your life be filled with endless happiness. ✨
</p>

<button onclick="showMessage()">Click For One More Surprise 💝</button>

<script>
function showMessage(){
    alert("You are one of the most precious people in my life. Always stay happy and keep smiling ❤️");
}

for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"%";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(heart);
}
</script>

</body>
  </html>
