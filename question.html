<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For You ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff5fa2,#ffc2d1);
text-align:center;
color:white;
}

.box{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
width:90%;
max-width:450px;
backdrop-filter:blur(10px);
}

h1{
font-size:35px;
}

button{
margin:10px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff2d75;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#message{
margin-top:20px;
font-size:22px;
display:none;
}
</style>
</head>

<body>

<div class="box">

<h1>Will you always be with me? ❤️</h1>

<button onclick="answer()">Yes 💖</button>

<button onclick="answer()">Always ❤️</button>

<p id="message">
I knew it, Billi! ❤️✨
</p>

</div>

<script>
function answer(){
document.getElementById("message").style.display="block";

setTimeout(function(){
window.location.href="anniversary.html";
},2500);
}
</script>

</body>
  </html>
